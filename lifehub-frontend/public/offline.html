<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeHub Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0f172a, #12243c);
        color: #f8fafc;
        font-family: Inter, Arial, sans-serif;
      }
      .offline-card {
        width: min(92vw, 460px);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-align: center;
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.28);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        margin-bottom: 18px;
        border-radius: 20px;
        background: linear-gradient(135deg, #0b5ae5, #12b5ea);
        font-size: 24px;
        font-weight: 800;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }
      p {
        margin: 0;
        color: rgba(226, 232, 240, 0.82);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <div class="badge">LH</div>
      <h1>You are offline</h1>
      <p>
        LifeHub will reconnect automatically when your internet is back. Your installed app shell is still ready,
        and the last cached workspace can reopen once the network returns.
      </p>
    </div>
  </body>
</html>
